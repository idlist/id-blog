<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>i'D Blog - Reinventing the Wheel</title>
  <link rel="shortcut icon" type="image/png" href="/public/favicon.png">
  <link rel="stylesheet" type="text/css" href="/assets/base.css">
  <link rel="stylesheet" type="text/css" href="/assets/homepage.css">
</head>

<body>
  <a class="menu-expander">
    <img class="menu-button" src="/public/buttons/menu.svg" alt="menu_button">
  </a>
  <div class="menu-fullscreen hidden">
    <div class="menu-fs-container">
      <a class="menu-fs-link" href="https://idl.ist/">
        <span class="menu-fs-link-text">個人ページ</span>
        <img class="menu-fs-link-external" src="/public/buttons/external.svg" alt="external">
      </a>
      <hr class="menu-fs-hr">
      <div class="menu-fs-link-title">言語</div>
      <a class="menu-fs-link" href="/">简体中文</a>
      <a class="menu-fs-link" href="/e/">English</a>
      <a class="menu-fs-link" href="/j/">日本語</a>
      <hr class="menu-fs-hr">
      <a class="menu-fs-link" href="/j/">記事</a>
      <hr class="menu-fs-hr">
    </div>
  </div>
  <header>
    <div class="header-container">
      <div class="header">
        <img class="header-banner" src="/public/banner.png" alt="banner">
        <hr class="header-divider">
        <div>i'D Blog</div>
      </div>
      <div class="menu-landscape">
        <a class="menu-link" href="/j/">記事</a>
        <div class="menu-link-dropdown">
          <div>言語</div>
          <div class="menu-link-dropdown-content">
            <a class="menu-link-dropdown-link" href="/">简体中文</a>
            <a class="menu-link-dropdown-link" href="/e/">English</a>
            <a class="menu-link-dropdown-link" href="/j/">日本語</a>
          </div>
        </div>
        <a class="menu-link" href="https://idl.ist/">
          <span>個人ページ</span>
          <img class="menu-link-external" src="/public/buttons/external.svg" alt="external">
        </a>
      </div>
    </div>
  </header>
  <div class="container-wrapper">
    <div class="container">
      <div class="homepage-container">
        <div class="homepage-information">
          <div class="homepage-me">
            <div class="homepage-me-icon-container">
              <img class="homepage-me-icon" src="/public/idlist.png" alt="idlist">
            </div>
            <div class="homepage-me-name">i'DLisT</div>
          </div>
          <div class="homepage-contact">
            <img class="homepage-contact-icon" src="/public/icon/email.svg" alt="email">
            <a class="homepage-contact-link" href="mailto:me@idl.ist">me@idl.ist</a>
          </div>
          <div class="homepage-contact">
            <img class="homepage-contact-icon" src="/public/icon/home.svg" alt="home">
            <a class="homepage-contact-link" href="https://idl.ist">idl.ist</a>
          </div>
          <div class="homepage-contact">
            <img class="homepage-contact-icon" src="/public/icon/github.svg" alt="github">
            <a class="homepage-contact-link" href="https://github.com/idlist">idlist</a>
          </div>
          <div class="homepage-contact">
            <img class="homepage-contact-icon" src="/public/icon/twitter.svg" alt="twitter">
            <a class="homepage-contact-link" href="https://twitter.com/i_dlist">@i_dlist</a>
          </div>
          <div class="homepage-contact">
            <img class="homepage-contact-icon" src="/public/icon/soundcloud.svg" alt="soundcloud">
            <a class="homepage-contact-link" href="https://soundcloud.com/idlist">i'DLisT</a>
          </div>
          <div class="homepage-stat">
            <div>記事がありません。</div>
          </div>
          <div class="homepage-source">
            <code>//</code> このブログの <a class="homepage-source-link" href="https://github.com/idlist/id-blog">ソースコード</a> を見る
          </div>
          <div class="tags">
            <div class="tags-title">Tags</div>
            <div class="tags-content">
              <div class="tags-notag">タグがありません</div>
            </div>
          </div>
          <div class="timeline">
            <div class="timeline-title">Timeline</div>
            <div class="timeline-notl">タイムラインがありません</div>
          </div>
        </div>
        <div class="homepage">
          <div class="post-noarticle">この言語で書いた記事がまたありません。</div>
        </div>
      </div>
    </div>
  </div>
  </div>
  <div id="bg-tiles"></div>
  <script type="module" src="/assets/base.js"></script>
  <script type="module" src="/assets/homepage.js"></script>

</html>
