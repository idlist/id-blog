env:
  commonjs: true
  es6: true
  node: true

plugins:
  - '@typescript-eslint'

extends:
  - eslint:recommended
  - plugin:@typescript-eslint/recommended

ignorePatterns:
  - dist/

globals:
  Atomics: readonly
  SharedArrayBuffer: readonly

parser: '@typescript-eslint/parser'

parserOptions:
  ecmaVersion: latest
  sourceType: module

rules:
  no-unused-vars: [warn]
  no-empty: [warn]

  semi: [warn, never]
  quotes: [warn, single]
  comma-dangle: [warn, never]
  indent: [warn, 2, { SwitchCase: 1 }]
